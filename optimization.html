<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Optimization Suggestions | Codalyze</title>

    <link rel="stylesheet"
          href="optimization.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- ================= HEADER ================= -->

    <header>

        <button class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back to Editor

        </button>

        <h1>

            Optimization Suggestions

        </h1>

        <p>

            Suggestions to improve your algorithm's performance and memory usage.

        </p>

    </header>



    <!-- ================= OPTIMIZATION POTENTIAL ================= -->

    <section class="section">

        <h2>Optimization Potential</h2>

        <div class="potential-card" id="potentialCard">

            <i class="fa-solid fa-circle-up"></i>

            <div>
                <h3 id="potentialLevel">-</h3>
                <p id="potentialDescription">
                </p>
            </div>

        </div>

    </section>



    <!-- ================= CURRENT VS TARGET ================= -->

    <section class="section">

        <h2>Current vs Target Performance</h2>

        <div class="comparison-grid">

            <div class="comparison-card">

                <h3>

                    Current Performance

                </h3>

                <div class="metric">

                    <span>Time Complexity</span>

                    <strong id="currentTime">-</strong>

                </div>

                <div class="metric">

                    <span>Auxiliary Space</span>

                    <strong id="currentSpace">-</strong>

                </div>

            </div>

            <div class="comparison-card">

                <h3>

                    Target Performance

                </h3>

                <div class="metric">

                    <span>Expected Time</span>

                    <strong id="targetTime">-</strong>

                </div>

                <div class="metric">

                    <span>Expected Space</span>

                    <strong id="targetSpace">-</strong>

                </div>

            </div>

        </div>

    </section>



    <!-- ================= SUGGESTIONS ================= -->

    <section class="section">

        <h2>Optimization Suggestions</h2>

        <div id="suggestionsContainer">
        </div>

    </section>

</div>

<script src="optimization.js"></script>

</body>

</html>
